<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380"><rect width="600" height="380" fill="#f6f3ee"/><rect x="0" y="0" width="600" height="380" fill="#b3492f"/><text x="40" y="38" font-family="Hanken Grotesk, Arial, sans-serif" font-size="15" font-weight="400" fill="#fffdfa" text-anchor="start">Color-drenched</text><text x="300" y="205" font-family="Hanken Grotesk, Arial, sans-serif" font-size="46" font-weight="800" fill="#fffdfa" text-anchor="middle">one color</text><text x="300" y="250" font-family="Hanken Grotesk, Arial, sans-serif" font-size="16" font-weight="400" fill="#fffdfa" text-anchor="middle">floods the whole surface</text></svg>