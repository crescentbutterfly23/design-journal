<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380"><rect width="600" height="380" fill="#f6f3ee"/><text x="120" y="40" font-family="Hanken Grotesk, Arial, sans-serif" font-size="15" font-weight="400" fill="#6a625b" text-anchor="start">Kerning = spacing of specific pairs</text><text x="120" y="170" font-family="Fraunces, Georgia, serif" font-size="120" font-weight="600" fill="#1b1714">A<tspan dx="6">V</tspan></text><text x="120" y="210" font-family="Hanken Grotesk, Arial, sans-serif" font-size="14" font-weight="400" fill="#6a625b" text-anchor="start">loose pair</text><text x="360" y="170" font-family="Fraunces, Georgia, serif" font-size="120" font-weight="600" fill="#1b1714">A<tspan dx="-34">V</tspan></text><text x="360" y="210" font-family="Hanken Grotesk, Arial, sans-serif" font-size="14" font-weight="400" fill="#b3492f" text-anchor="start">kerned (tucked)</text><text x="120" y="300" font-family="Hanken Grotesk, Arial, sans-serif" font-size="15" font-weight="400" fill="#6a625b" text-anchor="start">The V tucks under the A’s diagonal.</text></svg>