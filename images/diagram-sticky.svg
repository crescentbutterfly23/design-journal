<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380"><rect width="600" height="380" fill="#f6f3ee"/><text x="40" y="40" font-family="Hanken Grotesk, Arial, sans-serif" font-size="15" font-weight="400" fill="#6a625b" text-anchor="start">A section stays put while the page scrolls</text><rect x="60" y="70" width="200" height="260" rx="8" fill="#2f6b4f"/><text x="160" y="205" font-family="Hanken Grotesk, Arial, sans-serif" font-size="15" font-weight="600" fill="#fffdfa" text-anchor="middle">pinned</text><rect x="300" y="70" width="240" height="70" rx="6" fill="#fffdfa" stroke="#d9cfc2"/><rect x="300" y="160" width="240" height="70" rx="6" fill="#fffdfa" stroke="#d9cfc2"/><rect x="300" y="250" width="240" height="70" rx="6" fill="#fffdfa" stroke="#d9cfc2"/><text x="420" y="30" font-family="Hanken Grotesk, Arial, sans-serif" font-size="13" font-weight="400" fill="#b3492f" text-anchor="middle">scroll</text></svg>