<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380"><rect width="600" height="380" fill="#f6f3ee"/><text x="40" y="38" font-family="Hanken Grotesk, Arial, sans-serif" font-size="15" font-weight="400" fill="#6a625b" text-anchor="start">Typeface (the family) vs font (one style)</text><text x="80" y="140" font-family="Hanken Grotesk, Arial, sans-serif" font-size="46" font-weight="700" fill="#1b1714" text-anchor="start">Inter</text><text x="80" y="168" font-family="Hanken Grotesk, Arial, sans-serif" font-size="14" font-weight="400" fill="#6a625b" text-anchor="start">the typeface / family</text><text x="80" y="235" font-family="Hanken Grotesk, Arial, sans-serif" font-size="30" font-weight="400" fill="#1b1714" text-anchor="start">Regular</text><text x="330" y="235" font-family="Hanken Grotesk, Arial, sans-serif" font-size="30" font-weight="700" fill="#1b1714" text-anchor="start">Bold</text><text x="80" y="290" font-family="Georgia, serif" font-size="22" font-weight="400" fill="#1b1714" text-anchor="start">Italic</text><text x="330" y="290" font-family="Hanken Grotesk, Arial, sans-serif" font-size="40" font-weight="400" fill="#6a625b" text-anchor="start">18 / 24 / 36</text><text x="80" y="318" font-family="Hanken Grotesk, Arial, sans-serif" font-size="13" font-weight="400" fill="#6a625b" text-anchor="start">each = a font</text></svg>